name: Bump Version & Tag

# ---------------------------------------------------------------------------
# Run this workflow manually from the GitHub Actions tab to cut a release.
# It will:
#   1. Read the current version from pubspec.yaml
#   2. Increment the chosen component (major / minor / patch)
#   3. Commit the change back to main
#   4. Push a vX.Y.Z tag  →  triggers release.yml automatically
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which version component to increment?'
        required: true
        default: patch
        type: choice
        options:
          - patch    # 1.0.0 → 1.0.1
          - minor    # 1.0.0 → 1.1.0
          - major    # 1.0.0 → 2.0.0

permissions:
  contents: write   # needed to push the commit + tag

concurrency:
  group: bump-version
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version → tag → trigger release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT or the default GITHUB_TOKEN; either works for pushing.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Read current version from pubspec.yaml
        id: current
        run: |
          # Line looks like:  version: 1.2.3+45
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          SEM=$(echo "$FULL" | cut -d'+' -f1)   # 1.2.3
          BUILD=$(echo "$FULL" | cut -d'+' -f2)  # 45
          echo "sem=$SEM"   >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Current version: $SEM+$BUILD"

      - name: Compute new version
        id: new
        run: |
          BUMP="${{ github.event.inputs.bump }}"
          SEM="${{ steps.current.outputs.sem }}"
          BUILD="${{ steps.current.outputs.build }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEM"
          case $BUMP in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_BUILD=$((BUILD+1))

          NEW_SEM="${MAJOR}.${MINOR}.${PATCH}"
          NEW_FULL="${NEW_SEM}+${NEW_BUILD}"

          echo "sem=$NEW_SEM"   >> "$GITHUB_OUTPUT"
          echo "full=$NEW_FULL" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_FULL (tag: v$NEW_SEM)"

      - name: Update pubspec.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.new.outputs.full }}/" pubspec.yaml
          grep '^version:' pubspec.yaml  # confirm

      - name: Commit & push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${{ steps.new.outputs.full }}"
          git push origin HEAD

      - name: Create and push tag
        run: |
          git tag "v${{ steps.new.outputs.sem }}"
          git push origin "v${{ steps.new.outputs.sem }}"
          echo "Tagged: v${{ steps.new.outputs.sem }} — release workflow will start now."
