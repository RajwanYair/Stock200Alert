name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build production
        run: npx vite build

      - name: Bundle size check
        run: npm run check:bundle

      - name: Package build output
        run: |
          cd dist
          zip -r ../crosstide-${{ github.ref_name }}.zip .
          cd ..
          sha256sum crosstide-${{ github.ref_name }}.zip > crosstide-${{ github.ref_name }}.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            crosstide-${{ github.ref_name }}.zip
            crosstide-${{ github.ref_name }}.zip.sha256
