name: Auto Release (every 10 commits)

# ---------------------------------------------------------------------------
# Triggers on every push to main.
# Counts commits since the last semver tag; when the count is a multiple of
# 10 it automatically bumps the patch version, commits, tags, and pushes —
# which triggers release.yml to build the Windows ZIP + Android APK.
#
# Loop-guard: version-bump commits carry "[skip ci]", so this workflow is
# never re-triggered by its own commit.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]

permissions:
  contents: write   # push version-bump commit + tag

jobs:
  check-and-release:
    name: Count commits → auto-release at 10
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                    # need full history for git rev-list
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Count commits since last tag
        id: count
        run: |
          # Find the most recent semver tag (e.g. v1.2.3)
          LAST_TAG=$(git describe --tags --abbrev=0 \
            --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COUNT=$(git rev-list --count HEAD)
          else
            COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")
          fi

          if [ "$COUNT" -gt 0 ] && [ $((COUNT % 10)) -eq 0 ]; then
            SHOULD_RELEASE=true
          else
            SHOULD_RELEASE=false
          fi

          echo "last_tag=${LAST_TAG:-none}"     >> "$GITHUB_OUTPUT"
          echo "count=${COUNT}"                  >> "$GITHUB_OUTPUT"
          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "Commits since '${LAST_TAG:-initial}': ${COUNT}  →  release=${SHOULD_RELEASE}"

      - name: Bump patch & push tag
        if: steps.count.outputs.should_release == 'true'
        run: |
          # ── Read current version ──────────────────────────────────────────
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          SEM=$(echo "$FULL"  | cut -d'+' -f1)   # e.g. 1.2.3
          BUILD=$(echo "$FULL" | cut -d'+' -f2)  # e.g. 4

          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEM"
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD + 1))
          NEW_SEM="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_FULL="${NEW_SEM}+${NEW_BUILD}"

          # ── Update pubspec.yaml ───────────────────────────────────────────
          sed -i "s/^version: .*/version: ${NEW_FULL}/" pubspec.yaml
          grep '^version:' pubspec.yaml   # confirm

          # ── Commit & tag ─────────────────────────────────────────────────
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          # [skip ci] prevents this commit from re-triggering this workflow
          git commit -m "chore: bump version to ${NEW_FULL} [skip ci]"
          git tag "v${NEW_SEM}"
          git push origin main
          git push origin "v${NEW_SEM}"

          echo "✅ Auto-released v${NEW_SEM}"
