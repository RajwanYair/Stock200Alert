name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FLUTTER_VERSION: '3.x'

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 17   # hard kill at 1020 s — well above expected 60 s run
    steps:
      - uses: actions/checkout@v4

      - name: Create .env stub (gitignored asset)
        run: touch .env

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Drift, Freezed, etc.)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Run tests with coverage
        run: flutter test --coverage --timeout 30s

      - name: Enforce 100% domain coverage
        run: |
          # Extract number of uncovered lines in lib/src/domain/
          UNCOVERED=$(grep -A1 "^SF:lib/src/domain" coverage/lcov.info | \
            grep "^DA:.*,0$" | wc -l || echo 0)
          echo "Uncovered domain lines: $UNCOVERED"
          if [ "$UNCOVERED" -gt 0 ]; then
            echo "::error::Domain coverage is not 100% — $UNCOVERED lines uncovered."
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: analyze-and-test
    # Only build on PRs — push-to-main is covered by release.yml on tag push.
    # Running a full Windows build on every commit is unnecessary and expensive.
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Create .env stub (gitignored asset)
        shell: bash
        run: touch .env

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows/x64/runner/Release/
          retention-days: 1

  build-android:
    name: Build (Android Debug)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    # Only build on PRs — same rationale as build-windows above.
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create .env stub (gitignored asset)
        run: touch .env

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug, no signing)
        run: flutter build apk --debug

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1
