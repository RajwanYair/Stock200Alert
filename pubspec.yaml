name: cross_tide
description: >
  CrossTide - Cross-platform stock SMA crossover monitor.
  Detects SMA50/SMA150/SMA200 cross-up events, benchmarks vs SP500, and
  fires local notifications. Free Yahoo Finance data. Android + Windows.
publish_to: 'none'
version: 1.2.1+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management – Riverpod: compile-safe, testable, no BuildContext needed
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.0

  # Networking
  dio: ^5.8.0+1

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Persistence – Drift (SQLite): type-safe, migration-friendly, in-memory for tests
  drift: ^2.24.0
  sqlite3: ^3.3.0  # explicit; hook configured below to use system winsqlite3.dll
  sqlite3_flutter_libs: ^0.6.0+eol

  # Secure storage for API keys
  flutter_secure_storage: ^10.0.0

  # Environment variables (local dev only; never commit .env)
  flutter_dotenv: ^6.0.0

  # Local notifications – supports Windows toasts + Android channels + deep-links
  flutter_local_notifications: ^21.0.0

  # Background tasks (Android only; Windows NOT supported by workmanager)
  workmanager: ^0.9.0+3

  # Charts
  fl_chart: ^1.2.0

  # Logging
  logger: ^2.5.0

  # System tray: removed due to uuid version conflict with riverpod.
  # TODO: Re-add when system_tray supports uuid ^4. Use tray_manager or custom approach.

  # Utility
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  collection: ^1.19.1
  equatable: ^2.0.7
  cupertino_icons: ^1.0.8

  # Graphics & UI polish
  flutter_svg: ^2.1.0          # SVG asset rendering
  flutter_animate: ^4.5.2      # Micro-animations (fade/slide/scale)
  google_fonts: ^8.0.2         # Typography: Inter for numbers, Outfit for headings
  tray_manager: ^0.5.2

  # In-app updater — open release URLs on Android; launch Explorer on Windows
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  drift_dev: ^2.24.0
  mockito: ^5.4.5
  mocktail: ^1.0.4
  # Windows MSIX installer packaging
  msix: ^3.16.7

msix_config:
  display_name: CrossTide
  publisher_display_name: CrossTide
  identity_name: com.crosstide.app
  publisher: CN=CrossTide
  description: CrossTide - Cross-platform stock SMA crossover monitor
  msix_version: 1.0.0.0       # overridden at build time by release CI via --version flag
  logo_path: windows\runner\resources\app_icon.ico
  capabilities: internetClient
  sign_msix: false             # unsigned; users enable sideloading or install with Developer Mode

# Configure sqlite3 hook to avoid downloading from GitHub at test/build time.
# Uses Windows' built-in winsqlite3.dll (Windows 10+) so no network access needed.
hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/svg/
    - assets/sp500_tickers.json
    - assets/sector_map.json
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
