<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CrossTide — Stock monitoring dashboard with 12-method consensus signals"
    />
    <meta name="theme-color" content="#0d1117" />
    <title>CrossTide</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/components.css" />
  </head>
  <body>
    <header id="app-header">
      <div class="header-brand">
        <h1>CrossTide</h1>
        <span class="header-tagline">12-Method Consensus Dashboard</span>
      </div>
      <nav id="app-nav">
        <a href="#watchlist" class="nav-link active" data-route="watchlist">Watchlist</a>
        <a href="#consensus" class="nav-link" data-route="consensus">Consensus</a>
        <a href="#settings" class="nav-link" data-route="settings">Settings</a>
      </nav>
      <div id="market-status" class="status-badge">--</div>
    </header>

    <main id="app-main">
      <section id="view-watchlist" class="view active">
        <div class="card">
          <div class="card-header">
            <h2>Watchlist</h2>
            <div class="card-actions">
              <input
                id="add-ticker"
                type="text"
                placeholder="Add ticker (e.g. AAPL)"
                autocomplete="off"
              />
            </div>
          </div>
          <div id="watchlist-table-container">
            <table id="watchlist-table">
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Price</th>
                  <th>Change</th>
                  <th>Consensus</th>
                  <th>Volume</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="watchlist-body"></tbody>
            </table>
            <p id="watchlist-empty" class="empty-state">
              No tickers added yet. Type a symbol above and press Enter.
            </p>
          </div>
        </div>
      </section>

      <section id="view-consensus" class="view">
        <div class="card">
          <div class="card-header"><h2>Consensus Dashboard</h2></div>
          <div id="consensus-container">
            <p class="empty-state">
              Select a ticker from the watchlist to view its consensus breakdown.
            </p>
          </div>
        </div>
      </section>

      <section id="view-settings" class="view">
        <div class="card">
          <div class="card-header"><h2>Settings</h2></div>
          <div id="settings-container">
            <div class="setting-group">
              <label for="theme-select">Theme</label>
              <select id="theme-select">
                <option value="dark" selected>Dark</option>
                <option value="light">Light</option>
              </select>
            </div>
            <div class="setting-group">
              <label>Watchlist</label>
              <button id="btn-export" type="button">Export JSON</button>
              <button id="btn-import" type="button">Import JSON</button>
              <button id="btn-clear" type="button" class="btn-danger">Clear All</button>
            </div>
            <div class="setting-group">
              <label>Cache</label>
              <button id="btn-clear-cache" type="button">Clear Cache</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer id="app-footer">
      <span id="app-version"></span>
      <span id="sync-status">Ready</span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
